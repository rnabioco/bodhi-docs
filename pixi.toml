[workspace]
name = "bodhi-slurm-migration"
version = "0.1.0"
description = "Documentation site for Bodhi HPC LSF-to-SLURM migration"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
zensical = "*"

[tasks]
docs = "zensical serve"
build = "zensical build"
deploy = "zensical build --clean"
